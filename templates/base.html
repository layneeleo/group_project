{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flood Monitoring System</title>

    <!-- Bootstrap -->
     <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        body {
            background-color: #f5f6fa;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            background-color: #212529;
            padding-top: 20px;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            margin: 5px 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background-color: #0d6efd;
        }

        .content {
            margin-left: 260px;
            padding: 20px;
        }

        .topbar {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar text-white">

        <h4>🌊 Flood System</h4>

        <a href="{% url 'dashboard' %}">📊 Dashboard</a>
        <a href="{% url 'reports' %}">📁 Reports</a>
        <a href="{% url 'add_report' %}">➕ Add Report</a>
        <a href="{% url 'statistics' %}">📊 Statistics</a>
        <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>

    </div>

    <!-- MAIN CONTENT -->
    <div class="content">

        <!-- TOP BAR -->
        <div class="topbar d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Flood Monitoring Dashboard</h5>
            <span class="text-muted">Welcome 👋</span>
        </div>

        <!-- PAGE CONTENT -->
        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
