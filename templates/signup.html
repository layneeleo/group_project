
{% load static %}

{% block content %}
<style>
    /* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Background */
body {
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Wrapper */
.auth-wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Card */
.auth-card {
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.1);
    padding: 40px 35px;
    width: 360px;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    color: white;
    text-align: center;
}

/* Headings */
.auth-card h1 {
    font-size: 26px;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 14px;
    margin-bottom: 25px;
    opacity: 0.8;
}

/* Inputs */
.form-group {
    margin-bottom: 18px;
}

.form-group input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
    background: rgba(255,255,255,0.2);
    color: white;
}

.form-group input::placeholder {
    color: rgba(255,255,255,0.7);
}

/* Button */
.auth-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #ffffff;
    color: #333;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
}

.auth-btn:hover {
    background: #f1f1f1;
    transform: translateY(-2px);
}

/* Error */
.error-box {
    background: rgba(255, 0, 0, 0.2);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
    font-size: 13px;
}

/* Switch text */
.switch-text {
    margin-top: 15px;
    font-size: 14px;
}

.switch-text a {
    color: #fff;
    font-weight: bold;
    text-decoration: underline;
}
</style>



<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Create Account ✨</h1>
        <p class="subtitle">Join us today</p>

        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
                <div class="error-box">
                    {{ form.errors }}
                </div>
            {% endif %}

            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div class="form-group">
                <input type="password" name="password1" placeholder="Password" required>
            </div>

            <div class="form-group">
                <input type="password" name="password2" placeholder="Confirm Password" required>
            </div>

            <button type="submit" class="auth-btn">Sign Up</button>
        </form>

        <p class="switch-text">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</div>
{% endblock %}
